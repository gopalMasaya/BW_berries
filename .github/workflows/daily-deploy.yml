name: Daily Hosting Deploy

# Deploys public/ to Firebase Hosting once a day. The live dashboard reads sensor
# data in real time, so this only changes the site when the files in public/ change.
on:
  schedule:
    # 04:00 UTC daily. Cron is always UTC; GitHub may delay scheduled runs under load.
    - cron: '0 4 * * *'
  # Lets you trigger a deploy manually from the Actions tab (Run workflow).
  workflow_dispatch: {}

# Never run two deploys at once.
concurrency:
  group: hosting-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@15

      - name: Deploy to Firebase Hosting
        env:
          # Service-account JSON stored as an encrypted repo secret (Settings > Secrets).
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          firebase deploy --only hosting --project plantstracker-f1274 --non-interactive
