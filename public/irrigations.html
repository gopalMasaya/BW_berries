<!doctype html>
<html lang="he">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Irrigations — Plants Tracker</title>
  <link rel="stylesheet" href="app.css">
  <style>
    .filters { display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; margin-bottom:20px; }
    .filters .field { margin:0; min-width:120px; }
    .filters .field label { font-size:13px; margin-bottom:4px; }
    .filters .field input, .filters .field select { padding:8px 10px; font-size:14px; }

    .valve-table-wrap { overflow-x:auto; }
    table.crm tbody td { font-size:13px; padding:8px 10px; white-space:nowrap; }
    table.crm thead th { font-size:12px; padding:8px 10px; }
    .no-data { text-align:center; padding:40px; color:var(--muted); }
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="app-layout">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main-content">
      <button class="hamburger-btn" id="hamburgerBtn"><span></span><span></span><span></span></button>
      <div class="container">

        <div class="page-header">
          <h1 class="page-title">השקיות</h1>
        </div>

        <div class="card">
          <div class="filters">
            <div class="field">
              <label>Station</label>
              <select id="fStation"></select>
            </div>
            <div class="field">
              <label>From</label>
              <input type="date" id="fFrom" />
            </div>
            <div class="field">
              <label>To</label>
              <input type="date" id="fTo" />
            </div>
            <div class="field" style="min-width:100px;">
              <label>ml / pulse</label>
              <input type="number" id="fMl" min="0.1" step="0.1" value="2.4" />
            </div>
            <button class="btn-primary" id="fLoadBtn" style="height:38px;align-self:flex-end;">Load</button>
          </div>

          <div id="summary" style="font-size:13px;color:var(--muted);margin-bottom:8px;"></div>

          <div id="dailyTotalsWrap" style="margin-bottom:20px;display:none;">
            <h3 style="font-size:15px;margin:0 0 8px;">Daily totals</h3>
            <div class="valve-table-wrap">
              <table class="crm" id="dailyTotalsTable">
                <thead>
                  <tr>
                    <th>Date</th>
                    <th>Irrigations</th>
                    <th>Water In (L)</th>
                    <th>Water Out (L)</th>
                    <th>Drain %</th>
                  </tr>
                </thead>
                <tbody id="dailyTotalsBody"></tbody>
              </table>
            </div>
          </div>

          <div class="valve-table-wrap">
            <table class="crm" id="evtTable">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Start</th>
                  <th>End</th>
                  <th>Duration (min)</th>
                  <th>Pulses In</th>
                  <th>Pulses Out</th>
                  <th>Water In (L)</th>
                  <th>Water Out (L)</th>
                  <th>Drain %</th>
                </tr>
              </thead>
              <tbody id="evtBody"></tbody>
            </table>
          </div>
          <div id="evtEmpty" class="no-data" style="display:none;">No irrigations detected for this period</div>
        </div>

      </div>
    </main>
  </div>

  <script type="module">
    import { requireAuth } from "./guard.mjs";
    import { initSidebar } from "./sidebar.mjs";
    import { db } from "./auth.mjs";
    import { ref, get } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";
    import { STATIONS } from "./stations.mjs";

    const { profile } = await requireAuth(["manager"]);
    initSidebar(profile);
    const STATION_STORAGE_KEY = "irrigations.station";

    const stationSel = document.getElementById("fStation");
    const savedStation = localStorage.getItem(STATION_STORAGE_KEY);
    for (const s of STATIONS) {
      const opt = document.createElement("option");
      opt.value = s;
      opt.textContent = s;
      stationSel.appendChild(opt);
    }
    stationSel.value = STATIONS.includes(savedStation) ? savedStation : STATIONS[0];
    stationSel.addEventListener("change", () => {
      localStorage.setItem(STATION_STORAGE_KEY, stationSel.value);
      load();
    });

    function todayStr() { return new Date().toISOString().slice(0, 10); }
    function daysAgo(n) { return new Date(Date.now() - n * 86400000).toISOString().slice(0, 10); }
    function fmtDate(d) { if (!d) return "—"; return new Date(d).toLocaleDateString("en-GB"); }
    function fmtTime(d) { if (!d) return "—"; return new Date(d).toLocaleTimeString("en-GB", {hour:"2-digit",minute:"2-digit"}); }
    function fmtNum(v, dec=1) { if (v == null || !Number.isFinite(v)) return "—"; return Number(v).toFixed(dec); }

    // tsKey is DDMMYYYY_HHMMSS in local (Israel) clock per buildTimestamp on the device,
    // but serverTimestamp (ISO) is injected by the Cloud Function and is the reliable UTC
    // moment the reading was accepted. Always prefer serverTimestamp when present.
    function readingTime(tsKey, item) {
      if (item && item.serverTimestamp) return new Date(item.serverTimestamp);
      if (tsKey && tsKey.length >= 13) {
        const dd = tsKey.substring(0, 2);
        const mm = tsKey.substring(2, 4);
        const yyyy = tsKey.substring(4, 8);
        const hh = tsKey.substring(9, 11) || "00";
        const mi = tsKey.substring(11, 13) || "00";
        const ss = tsKey.substring(13, 15) || "00";
        return new Date(`${yyyy}-${mm}-${dd}T${hh}:${mi}:${ss}`);
      }
      return null;
    }

    function monthKeysBetween(fromDate, toDate) {
      const keys = [];
      const d = new Date(fromDate.getFullYear(), fromDate.getMonth(), 1);
      const end = new Date(toDate.getFullYear(), toDate.getMonth(), 1);
      while (d <= end) {
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        const yyyy = String(d.getFullYear());
        keys.push(`${mm}${yyyy}`);
        d.setMonth(d.getMonth() + 1);
      }
      return keys;
    }

    async function fetchReadings(stationId, fromDate, toDate) {
      const monthKeys = monthKeysBetween(fromDate, toDate);
      const readings = [];
      for (const mk of monthKeys) {
        const snap = await get(ref(db, `berries/${stationId}/${mk}`));
        const val = snap.val();
        if (!val) continue;
        for (const tsKey of Object.keys(val)) {
          const item = val[tsKey];
          if (!item || typeof item !== "object") continue;
          const t = readingTime(tsKey, item);
          if (!t || isNaN(t.getTime())) continue;
          if (t < fromDate || t > toDate) continue;
          readings.push({
            time: t,
            // waterIn/waterOut taken straight from the DB (no channel swap)
            waterIn: Number(item.waterIn) || 0,
            waterOut: Number(item.waterOut) || 0,
          });
        }
      }
      readings.sort((a, b) => a.time - b.time);
      return readings;
    }

    async function load() {
      const stationId = document.getElementById("fStation").value.trim();
      const fromStr = document.getElementById("fFrom").value;
      const toStr = document.getElementById("fTo").value;
      const mlPerPulse = Math.max(0.1, parseFloat(document.getElementById("fMl").value) || 2.4);

      if (!stationId || !fromStr || !toStr) return;

      const fromDate = new Date(fromStr + "T00:00:00");
      const toDate = new Date(toStr + "T23:59:59");

      const btn = document.getElementById("fLoadBtn");
      btn.disabled = true; btn.textContent = "Loading...";

      try {
        const readings = await fetchReadings(stationId, fromDate, toDate);

        // Pulse counters on the device are cumulative and never reset, so
        // consecutive readings repeat the same value when no new flow occurs.
        // Convert each reading to the delta vs. the previous one: first reading
        // is the baseline (no event emitted); a current value below the previous
        // is treated as a counter reset where current is the post-reset total.
        let prevIn = null, prevOut = null;
        const events = [];
        for (const r of readings) {
          let deltaIn = 0, deltaOut = 0;
          if (prevIn !== null) {
            deltaIn  = r.waterIn  >= prevIn  ? r.waterIn  - prevIn  : r.waterIn;
            deltaOut = r.waterOut >= prevOut ? r.waterOut - prevOut : r.waterOut;
          }
          prevIn  = r.waterIn;
          prevOut = r.waterOut;
          if (deltaIn <= 0 && deltaOut <= 0) continue;
          const waterInL  = (deltaIn  * mlPerPulse) / 1000;
          const waterOutL = (deltaOut * mlPerPulse) / 1000;
          const drainPct  = deltaIn > 0 ? (deltaOut / deltaIn) * 100 : null;
          events.push({
            startTime: r.time,
            endTime: r.time,
            durationMin: 0,
            pulsesIn: deltaIn,
            pulsesOut: deltaOut,
            waterInL,
            waterOutL,
            drainPct,
          });
        }
        events.reverse();

        console.log("readings:", readings.length, "events:", events.length);
        if (events[0]) console.log("first event:", events[0]);

        const tbody = document.getElementById("evtBody");
        const empty = document.getElementById("evtEmpty");
        const summary = document.getElementById("summary");

        const dailyWrap = document.getElementById("dailyTotalsWrap");
        const dailyBody = document.getElementById("dailyTotalsBody");

        if (events.length === 0) {
          tbody.innerHTML = "";
          dailyBody.innerHTML = "";
          dailyWrap.style.display = "none";
          empty.style.display = "";
          summary.textContent = `${readings.length} readings · 0 flow readings`;
          return;
        }
        empty.style.display = "none";

        let totalIn = 0, totalOut = 0;
        for (const e of events) { totalIn += e.waterInL; totalOut += e.waterOutL; }
        const avgDrain = totalIn > 0 ? (totalOut / totalIn) * 100 : 0;
        summary.textContent =
          `${readings.length} readings · ${events.length} flow readings · in ${totalIn.toFixed(2)} L · out ${totalOut.toFixed(2)} L · drain ${avgDrain.toFixed(1)}%`;

        const byDay = new Map();
        for (const e of events) {
          const dayKey = new Date(e.startTime).toLocaleDateString("en-CA"); // YYYY-MM-DD, locale-safe
          let d = byDay.get(dayKey);
          if (!d) { d = { date: e.startTime, count: 0, inL: 0, outL: 0 }; byDay.set(dayKey, d); }
          d.count += 1;
          d.inL += e.waterInL;
          d.outL += e.waterOutL;
        }
        const dailyRows = [...byDay.values()].sort((a, b) => b.date - a.date);
        dailyWrap.style.display = "";
        dailyBody.innerHTML = dailyRows.map(d => {
          const drain = d.inL > 0 ? (d.outL / d.inL) * 100 : null;
          return `<tr>
            <td>${fmtDate(d.date)}</td>
            <td>${d.count}</td>
            <td>${fmtNum(d.inL, 2)}</td>
            <td>${fmtNum(d.outL, 2)}</td>
            <td>${drain == null ? "—" : fmtNum(drain)}</td>
          </tr>`;
        }).join("");

        tbody.innerHTML = events.map(e => `
          <tr>
            <td>${fmtDate(e.startTime)}</td>
            <td>${fmtTime(e.startTime)}</td>
            <td>${fmtTime(e.endTime)}</td>
            <td>${fmtNum(e.durationMin)}</td>
            <td>${fmtNum(e.pulsesIn, 0)}</td>
            <td>${fmtNum(e.pulsesOut, 0)}</td>
            <td>${fmtNum(e.waterInL, 2)}</td>
            <td>${fmtNum(e.waterOutL, 2)}</td>
            <td>${e.drainPct == null ? "—" : fmtNum(e.drainPct)}</td>
          </tr>
        `).join("");
      } catch (err) {
        console.error("irrigations load error", err);
        document.getElementById("summary").textContent = "Error: " + err.message;
      } finally {
        btn.disabled = false; btn.textContent = "Load";
      }
    }

    document.getElementById("fLoadBtn").addEventListener("click", load);

    document.getElementById("fFrom").value = daysAgo(7);
    document.getElementById("fTo").value = todayStr();
    load();
  </script>
</body>
</html>
